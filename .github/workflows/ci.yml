name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  # ---------- Format ----------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ---------- Clippy ----------
  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.os }}

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------- Test ----------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}

      - name: Build tests
        run: cargo test --workspace --no-run

      - name: Run tests
        run: cargo test --workspace

  # ---------- Build aegis-probe ----------
  build-probe:
    name: Build aegis-probe (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-probe-${{ matrix.os }}

      - name: Build aegis-probe
        run: cargo build --release -p aegis-probe

      - name: Verify binary runs
        run: ./target/release/aegis-probe --version

      - name: Smoke packaged archive
        run: |
          tar czf aegis-probe-ci-${{ matrix.os }}.tar.gz -C target/release aegis-probe
          rm -rf package-smoke
          mkdir -p package-smoke
          tar xzf aegis-probe-ci-${{ matrix.os }}.tar.gz -C package-smoke
          ./package-smoke/aegis-probe --version
          ./package-smoke/aegis-probe validate --probes-dir probes

      - name: Validate built-in probes
        run: ./target/release/aegis-probe validate --probes-dir probes

      - name: List probes
        run: ./target/release/aegis-probe list --probes-dir probes

      - name: Dry run (verify probe filtering)
        run: ./target/release/aegis-probe run --probes-dir probes --dry-run --category prompt_injection

  # ---------- GitHub Action smoke ----------
  action-smoke:
    name: Action Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mock safe action run
        id: safe
        uses: ./
        with:
          agent: mock-safe
          probe: curl-pipe-bash
          output: artifacts/mock-safe-report.json
          sarif-output: artifacts/mock-safe-report.sarif
          junit-output: artifacts/mock-safe-report.xml

      - name: Assert safe action outputs
        run: |
          test -f artifacts/mock-safe-report.json
          test -f artifacts/mock-safe-report.sarif
          test -f artifacts/mock-safe-report.xml
          test -n "${{ steps.safe.outputs['probe-pack-hash'] }}"
          test -n "${{ steps.safe.outputs['schema-version'] }}"
          test "${{ steps.safe.outputs['exit-code'] }}" = "0"

      - name: Mock vulnerable action run
        id: vulnerable
        uses: ./
        continue-on-error: true
        with:
          agent: mock-vulnerable
          probe: curl-pipe-bash
          fail-on: critical
          output: artifacts/mock-vulnerable-report.json

      - name: Assert vulnerable action gate trips
        run: |
          test -f artifacts/mock-vulnerable-report.json
          test "${{ steps.vulnerable.outcome }}" = "failure"
          test "${{ steps.vulnerable.outputs['exit-code'] }}" != "0"

      - name: Upload action smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: action-smoke-artifacts
          path: artifacts/

  # ---------- Documentation ----------
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: doc

      - name: Build docs
        run: cargo doc --workspace --no-deps

  # ---------- MSRV ----------
  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Check MSRV
        run: cargo check --workspace --locked

  # ---------- Security audit ----------
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: audit

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  # ---------- Dependency checks (cargo-deny) ----------
  deny:
    name: Dependency Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [advisories, licenses, bans, sources]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: deny-${{ matrix.check }}

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: cargo deny --all-features --locked check ${{ matrix.check }}

  # ---------- Unused dependencies ----------
  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          key: udeps

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Check for unused deps
        run: cargo +nightly udeps --workspace
        continue-on-error: true  # advisory only, don't block CI
