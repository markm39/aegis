name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  # ---------- Format ----------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ---------- Clippy ----------
  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.os }}

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------- Test ----------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}

      - name: Build tests
        run: cargo test --workspace --no-run

      - name: Run tests
        run: cargo test --workspace

  # ---------- Build aegis-probe ----------
  build-probe:
    name: Build aegis-probe (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-probe-${{ matrix.os }}

      - name: Build aegis-probe
        run: cargo build --release -p aegis-probe

      - name: Verify binary runs
        run: ./target/release/aegis-probe --version

      - name: Smoke packaged archive
        run: |
          tar czf aegis-probe-ci-${{ matrix.os }}.tar.gz -C target/release aegis-probe
          rm -rf package-smoke
          mkdir -p package-smoke
          tar xzf aegis-probe-ci-${{ matrix.os }}.tar.gz -C package-smoke
          ./package-smoke/aegis-probe --version
          ./package-smoke/aegis-probe profiles | grep -q 'github-actions'
          ./package-smoke/aegis-probe validate --probes-dir probes
          ./package-smoke/aegis-probe run \
            --agent mock-safe \
            --probes-dir probes \
            --probe curl-pipe-bash \
            --output package-smoke/smoke.json \
            --format json
          ./package-smoke/aegis-probe render \
            package-smoke/smoke.json \
            --format sarif \
            --output package-smoke/smoke.sarif
          ./package-smoke/aegis-probe render \
            package-smoke/smoke.json \
            --format junit \
            --output package-smoke/smoke.xml
          mkdir -p package-smoke/history-reports
          ./package-smoke/aegis-probe run \
            --agent mock-safe \
            --probes-dir probes \
            --probe sbom-report-injection \
            --tag ci-artifact \
            --output package-smoke/history-reports/safe.json \
            --format json
          ./package-smoke/aegis-probe run \
            --agent mock-vulnerable \
            --probes-dir probes \
            --probe sbom-report-injection \
            --tag ci-artifact \
            --output package-smoke/history-reports/vuln.json \
            --format json || true
          ./package-smoke/aegis-probe compare \
            package-smoke/history-reports/safe.json \
            package-smoke/history-reports/vuln.json \
            --tag ci-artifact \
            --format json \
            --output package-smoke/compare.json || true
          ./package-smoke/aegis-probe history \
            package-smoke/history-reports \
            --agent ClaudeCode \
            --tag ci-artifact \
            --format json \
            > package-smoke/history.json
          ./package-smoke/aegis-probe registry export-history \
            package-smoke/history-reports \
            --agent ClaudeCode \
            --tag ci-artifact \
            --output package-smoke/history-bundle.json
          ./package-smoke/aegis-probe baseline promote \
            package-smoke/history-reports/safe.json \
            --name ci-main \
            --profile ci-artifacts \
            --output package-smoke/baseline.bundle.json
          ./package-smoke/aegis-probe baseline publish \
            package-smoke/baseline.bundle.json \
            --store package-smoke/baselines
          ./package-smoke/aegis-probe baseline fetch \
            --store package-smoke/baselines \
            --agent ClaudeCode \
            --name ci-main \
            --profile ci-artifacts \
            --format report \
            --output package-smoke/fetched-baseline.json
          REPORT_PATH=package-smoke/smoke.json python3 - <<'PY'
          import json
          import os

          with open(os.environ["REPORT_PATH"], "r", encoding="utf-8") as handle:
              report = json.load(handle)

          assert report["summary"]["passed"] == 1
          assert report["summary"]["failed"] == 0
          assert report["metadata"]["schema_version"] == 3
          PY
          HISTORY_PATH=package-smoke/history.json BUNDLE_PATH=package-smoke/history-bundle.json python3 - <<'PY'
          import json
          import os

          with open(os.environ["HISTORY_PATH"], "r", encoding="utf-8") as handle:
              history = json.load(handle)
          with open(os.environ["BUNDLE_PATH"], "r", encoding="utf-8") as handle:
              bundle = json.load(handle)
          with open("package-smoke/compare.json", "r", encoding="utf-8") as handle:
              comparison = json.load(handle)
          with open("package-smoke/fetched-baseline.json", "r", encoding="utf-8") as handle:
              baseline_report = json.load(handle)

          assert comparison["summary"]["regression_count"] == 1
          assert comparison["tag_filter"] == ["ci-artifact"]
          assert history["run_count"] == 2
          assert history["tag_filter"] == ["ci-artifact"]
          assert history["regressions"]
          assert baseline_report["metadata"]["selected_profiles"] == ["ci-artifacts"]
          assert baseline_report["results"][0]["probe_name"] == "sbom-report-injection"
          assert bundle["schema_version"] == 1
          assert bundle["run_count"] == 2
          assert bundle["tag_filter"] == ["ci-artifact"]
          assert bundle["regressions"]
          PY
          grep -q '"version": "2.1.0"' package-smoke/smoke.sarif
          grep -q '<testsuite' package-smoke/smoke.xml

      - name: Validate built-in probes
        run: ./target/release/aegis-probe validate --probes-dir probes

      - name: List probes
        run: ./target/release/aegis-probe list --probes-dir probes

      - name: Dry run (verify probe filtering)
        run: ./target/release/aegis-probe run --probes-dir probes --dry-run --category prompt_injection

  # ---------- GitHub Action smoke ----------
  action-smoke:
    name: Action Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mock safe action run
        id: safe
        uses: ./
        with:
          agent: mock-safe
          probe: sbom-report-injection
          profile: ci-artifacts
          output: artifacts/mock-safe-report.json
          sarif-output: artifacts/mock-safe-report.sarif
          junit-output: artifacts/mock-safe-report.xml

      - name: Assert safe action outputs
        run: |
          test -f artifacts/mock-safe-report.json
          test -f artifacts/mock-safe-report.sarif
          test -f artifacts/mock-safe-report.xml
          test -n "${{ steps.safe.outputs['probe-pack-hash'] }}"
          test -n "${{ steps.safe.outputs['schema-version'] }}"
          test "${{ steps.safe.outputs['exit-code'] }}" = "0"
          test "${{ steps.safe.outputs.passed }}" = "1"
          test "${{ steps.safe.outputs.failed }}" = "0"
          REPORT_PATH=artifacts/mock-safe-report.json python3 - <<'PY'
          import json
          import os

          with open(os.environ["REPORT_PATH"], "r", encoding="utf-8") as handle:
              report = json.load(handle)

          assert report["summary"]["passed"] == 1
          assert report["summary"]["failed"] == 0
          assert report["metadata"]["schema_version"] == 3
          assert report["metadata"]["selected_profiles"] == ["ci-artifacts"]
          PY
          grep -q '"version": "2.1.0"' artifacts/mock-safe-report.sarif
          grep -q '<testsuite' artifacts/mock-safe-report.xml

      - name: Prepare history baseline
        run: |
          mkdir -p artifacts/history
          cp artifacts/mock-safe-report.json artifacts/history/safe.json

      - name: Mock vulnerable action run
        id: vulnerable
        uses: ./
        continue-on-error: true
        with:
          agent: mock-vulnerable
          probe: sbom-report-injection
          profile: ci-artifacts
          fail-on: critical
          output: artifacts/mock-vulnerable-report.json
          baseline-report: artifacts/mock-safe-report.json
          history-dir: artifacts/history
          stability-runs: 2
          max-regressions: 0
          min-history-runs: 3

      - name: Assert vulnerable action gate trips
        run: |
          test -f artifacts/mock-vulnerable-report.json
          test "${{ steps.vulnerable.outcome }}" = "failure"
          test "${{ steps.vulnerable.outputs['exit-code'] }}" != "0"
          test "${{ steps.vulnerable.outputs.failed }}" != "0"
          test -n "${{ steps.vulnerable.outputs['compare-path'] }}"
          test -n "${{ steps.vulnerable.outputs['history-path'] }}"
          test -n "${{ steps.vulnerable.outputs['stability-report-dir'] }}"
          test -f "${{ steps.vulnerable.outputs['compare-path'] }}"
          test -f "${{ steps.vulnerable.outputs['history-path'] }}"
          test "${{ steps.vulnerable.outputs.regressions }}" = "1"
          test "${{ steps.vulnerable.outputs.improvements }}" = "0"
          test "${{ steps.vulnerable.outputs['history-run-count'] }}" = "3"
          test "${{ steps.vulnerable.outputs['unstable-probes'] }}" = "1"

      - name: Upload action smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: action-smoke-artifacts
          path: artifacts/

  # ---------- Documentation ----------
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: doc

      - name: Build docs
        run: cargo doc --workspace --no-deps

  # ---------- MSRV ----------
  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Check MSRV
        run: cargo check --workspace --locked

  # ---------- Security audit ----------
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: audit

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  # ---------- Dependency checks (cargo-deny) ----------
  deny:
    name: Dependency Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [advisories, licenses, bans, sources]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: deny-${{ matrix.check }}

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: cargo deny --all-features --locked check ${{ matrix.check }}

  # ---------- Unused dependencies ----------
  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          key: udeps

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Check for unused deps
        run: cargo +nightly udeps --workspace
        continue-on-error: true  # advisory only, don't block CI
