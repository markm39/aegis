name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }} -p aegis-probe

      - name: Strip binary
        run: |
          strip target/${{ matrix.target }}/release/aegis-probe

      - name: Package
        env:
          TAG_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${TAG_NAME#v}"
          tar czf "aegis-probe-${VERSION}-${TARGET}.tar.gz" \
            -C "target/${TARGET}/release" aegis-probe

      - name: Smoke packaged archive
        env:
          TAG_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${TAG_NAME#v}"
          rm -rf package-smoke
          mkdir -p package-smoke
          tar xzf "aegis-probe-${VERSION}-${TARGET}.tar.gz" -C package-smoke
          ./package-smoke/aegis-probe --version
          ./package-smoke/aegis-probe profiles | grep -q 'github-actions'
          ./package-smoke/aegis-probe validate --probes-dir probes
          ./package-smoke/aegis-probe run \
            --agent mock-safe \
            --probes-dir probes \
            --probe curl-pipe-bash \
            --output package-smoke/smoke.json \
            --format json
          ./package-smoke/aegis-probe render \
            package-smoke/smoke.json \
            --format sarif \
            --output package-smoke/smoke.sarif
          ./package-smoke/aegis-probe render \
            package-smoke/smoke.json \
            --format junit \
            --output package-smoke/smoke.xml
          mkdir -p package-smoke/history-reports
          ./package-smoke/aegis-probe run \
            --agent mock-safe \
            --probes-dir probes \
            --probe sbom-report-injection \
            --tag ci-artifact \
            --output package-smoke/history-reports/safe.json \
            --format json
          ./package-smoke/aegis-probe run \
            --agent mock-vulnerable \
            --probes-dir probes \
            --probe sbom-report-injection \
            --tag ci-artifact \
            --output package-smoke/history-reports/vuln.json \
            --format json || true
          ./package-smoke/aegis-probe compare \
            package-smoke/history-reports/safe.json \
            package-smoke/history-reports/vuln.json \
            --tag ci-artifact \
            --format json \
            --output package-smoke/compare.json || true
          ./package-smoke/aegis-probe history \
            package-smoke/history-reports \
            --agent ClaudeCode \
            --tag ci-artifact \
            --format json \
            > package-smoke/history.json
          ./package-smoke/aegis-probe registry export-history \
            package-smoke/history-reports \
            --agent ClaudeCode \
            --tag ci-artifact \
            --output package-smoke/history-bundle.json
          ./package-smoke/aegis-probe baseline promote \
            package-smoke/history-reports/safe.json \
            --name ci-main \
            --profile ci-artifacts \
            --output package-smoke/baseline.bundle.json
          ./package-smoke/aegis-probe baseline publish \
            package-smoke/baseline.bundle.json \
            --store package-smoke/baselines
          ./package-smoke/aegis-probe baseline fetch \
            --store package-smoke/baselines \
            --agent ClaudeCode \
            --name ci-main \
            --profile ci-artifacts \
            --format report \
            --output package-smoke/fetched-baseline.json
          REPORT_PATH=package-smoke/smoke.json python3 - <<'PY'
          import json
          import os

          with open(os.environ["REPORT_PATH"], "r", encoding="utf-8") as handle:
              report = json.load(handle)

          assert report["summary"]["passed"] == 1
          assert report["summary"]["failed"] == 0
          assert report["metadata"]["schema_version"] == 3
          PY
          HISTORY_PATH=package-smoke/history.json BUNDLE_PATH=package-smoke/history-bundle.json python3 - <<'PY'
          import json
          import os

          with open(os.environ["HISTORY_PATH"], "r", encoding="utf-8") as handle:
              history = json.load(handle)
          with open(os.environ["BUNDLE_PATH"], "r", encoding="utf-8") as handle:
              bundle = json.load(handle)
          with open("package-smoke/compare.json", "r", encoding="utf-8") as handle:
              comparison = json.load(handle)
          with open("package-smoke/fetched-baseline.json", "r", encoding="utf-8") as handle:
              baseline_report = json.load(handle)

          assert comparison["summary"]["regression_count"] == 1
          assert comparison["tag_filter"] == ["ci-artifact"]
          assert history["run_count"] == 2
          assert history["tag_filter"] == ["ci-artifact"]
          assert history["regressions"]
          assert baseline_report["metadata"]["selected_profiles"] == ["ci-artifacts"]
          assert baseline_report["results"][0]["probe_name"] == "sbom-report-injection"
          assert bundle["schema_version"] == 1
          assert bundle["run_count"] == 2
          assert bundle["tag_filter"] == ["ci-artifact"]
          assert bundle["regressions"]
          PY
          grep -q '"version": "2.1.0"' package-smoke/smoke.sarif
          grep -q '<testsuite' package-smoke/smoke.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-${{ matrix.target }}
          path: aegis-*.tar.gz

  universal:
    name: Universal Binary
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: aegis-aarch64-apple-darwin
          path: arm64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: aegis-x86_64-apple-darwin
          path: x86_64

      - name: Extract binaries
        run: |
          mkdir -p extracted/arm64 extracted/x86_64
          tar xzf arm64/aegis-*-aarch64-apple-darwin.tar.gz -C extracted/arm64
          tar xzf x86_64/aegis-*-x86_64-apple-darwin.tar.gz -C extracted/x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            extracted/arm64/aegis-probe \
            extracted/x86_64/aegis-probe \
            -output aegis-probe
          strip aegis-probe
          lipo -info aegis-probe

      - name: Generate completions
        run: |
          mkdir -p completions
          mkdir -p history-reports
          chmod +x aegis-probe
          ./aegis-probe profiles > /dev/null
          ./aegis-probe run --agent mock-safe --probes-dir probes --probe curl-pipe-bash --output universal-smoke.json --format json
          ./aegis-probe run --agent mock-safe --probes-dir probes --probe sbom-report-injection --tag ci-artifact --output history-reports/safe.json --format json
          ./aegis-probe run --agent mock-vulnerable --probes-dir probes --probe sbom-report-injection --tag ci-artifact --output history-reports/vuln.json --format json || true
          ./aegis-probe compare history-reports/safe.json history-reports/vuln.json --tag ci-artifact --format json --output universal-compare.json || true
          ./aegis-probe history history-reports --agent ClaudeCode --tag ci-artifact --format json > universal-history.json
          ./aegis-probe registry export-history history-reports --agent ClaudeCode --tag ci-artifact --output universal-history-bundle.json
          ./aegis-probe baseline promote history-reports/safe.json --name ci-main --profile ci-artifacts --output universal-baseline.bundle.json
          ./aegis-probe completions bash > completions/aegis-probe.bash
          ./aegis-probe completions zsh > completions/_aegis-probe
          ./aegis-probe completions fish > completions/aegis-probe.fish

      - name: Package universal binary
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          tar czf "aegis-probe-${VERSION}-universal-apple-darwin.tar.gz" aegis-probe

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-universal
          path: |
            aegis-*-universal-apple-darwin.tar.gz
            completions/

  release:
    name: Create Release
    needs: [build, universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          cp artifacts/aegis-aarch64-apple-darwin/aegis-probe-*.tar.gz release/
          cp artifacts/aegis-x86_64-apple-darwin/aegis-probe-*.tar.gz release/
          cp artifacts/aegis-x86_64-unknown-linux-gnu/aegis-probe-*.tar.gz release/
          cp artifacts/aegis-universal/aegis-probe-*.tar.gz release/
          cp artifacts/aegis-universal/completions/* release/ || true

      - name: Generate checksums
        run: |
          cd release
          sha256sum aegis-probe-*.tar.gz > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            release/aegis-probe-*.tar.gz
            release/checksums-sha256.txt
            release/aegis-probe.bash
            release/_aegis-probe
            release/aegis-probe.fish

  docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: aegis-x86_64-unknown-linux-gnu
          path: docker-build

      - name: Extract binary and prepare Docker context
        run: |
          cd docker-build
          tar xzf aegis-probe-*-x86_64-unknown-linux-gnu.tar.gz
          cat > Dockerfile <<'DEOF'
          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y --no-install-recommends ca-certificates curl && rm -rf /var/lib/apt/lists/*
          RUN groupadd --gid 1000 aegis && useradd --uid 1000 --gid aegis --create-home aegis
          COPY aegis-probe /usr/local/bin/aegis-probe
          RUN chmod +x /usr/local/bin/aegis-probe
          USER aegis
          WORKDIR /home/aegis
          ENTRYPOINT ["aegis-probe"]
          CMD ["--help"]
          DEOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-build
          file: docker-build/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'alpha') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc')"
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts for checksums
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          ARM64_SHA=$(sha256sum artifacts/aegis-aarch64-apple-darwin/aegis-probe-*-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          X86_64_SHA=$(sha256sum artifacts/aegis-x86_64-apple-darwin/aegis-probe-*-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          echo "arm64_sha=${ARM64_SHA}" >> "$GITHUB_OUTPUT"
          echo "x86_64_sha=${X86_64_SHA}" >> "$GITHUB_OUTPUT"

      - name: Update formula and push to tap
        env:
          TAG_NAME: ${{ github.ref_name }}
          ARM64_SHA: ${{ steps.hashes.outputs.arm64_sha }}
          X86_64_SHA: ${{ steps.hashes.outputs.x86_64_sha }}
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${TAG_NAME#v}"
          sed -e "s/PLACEHOLDER_VERSION/${VERSION}/g" \
              -e "s/PLACEHOLDER_ARM64_SHA256/${ARM64_SHA}/g" \
              -e "s/PLACEHOLDER_X86_64_SHA256/${X86_64_SHA}/g" \
              Formula/aegis.rb > updated-aegis.rb
          TMPDIR=$(mktemp -d)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/markm39/homebrew-tap.git" "$TMPDIR/tap"
          mkdir -p "$TMPDIR/tap/Formula"
          cp updated-aegis.rb "$TMPDIR/tap/Formula/aegis.rb"
          cd "$TMPDIR/tap"
          git config user.email "markmiller0470@gmail.com"
          git config user.name "markm39"
          git add Formula/aegis.rb
          git diff --cached --quiet && echo "No changes to formula" && exit 0
          git commit -m "Update aegis to ${TAG_NAME}"
          git push origin main
