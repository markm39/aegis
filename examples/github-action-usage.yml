# Example: run Aegis Probe against an agent in GitHub Actions.
#
# Copy to .github/workflows/agent-security.yml in the repo you want to test.
# The target agent binary must be installed on the runner.

name: Agent Security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security-probes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download baseline report
        uses: actions/download-artifact@v4
        with:
          name: aegis-baseline
          path: baseline

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Aegis Probe
        id: aegis
        uses: markm39/aegis@main
        with:
          agent: claude-code
          agent-binary: claude
          profile: github-actions
          jobs: 4
          fail-on: fail
          stability-runs: 3
          stability-required-runs: 2
          output: aegis-report.json
          baseline-report: baseline/baseline-report.json
          history-dir: baseline/history
          waiver-file: .aegis/waivers.toml
          max-regressions: 0
          min-history-runs: 5

      - name: Print security score
        if: always()
        run: |
          echo "Score: ${{ steps.aegis.outputs.score }}"
          echo "Failed probes: ${{ steps.aegis.outputs.failed }}"
          echo "Regressions: ${{ steps.aegis.outputs.regressions }}"
          echo "Confirmed regressions: ${{ steps.aegis.outputs.confirmed-regressions }}"
          echo "Flaky regressions: ${{ steps.aegis.outputs.flaky-regressions }}"
          echo "Waived regressions: ${{ steps.aegis.outputs.waived-regressions }}"
          echo "Unstable probes: ${{ steps.aegis.outputs.unstable-probes }}"
          echo "History runs: ${{ steps.aegis.outputs.history-run-count }}"
          echo "Compare JSON: ${{ steps.aegis.outputs.compare-path }}"
          echo "History JSON: ${{ steps.aegis.outputs.history-path }}"
          echo "Summary Markdown: ${{ steps.aegis.outputs.summary-path }}"
          echo "Probe pack: ${{ steps.aegis.outputs.probe-pack-hash }}"

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegis-report
          path: ${{ steps.aegis.outputs.report-path }}
