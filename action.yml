name: 'Aegis Probe - AI Agent Security Testing'
description: 'Run adversarial security probes against AI coding agents'
branding:
  icon: shield
  color: red

inputs:
  agent:
    description: 'Agent to test (claude-code, codex, openclaw, cursor, aider)'
    required: false
    default: 'claude-code'
  agent-binary:
    description: 'Path to the agent binary (auto-detected if not specified)'
    required: false
  probes-dir:
    description: 'Directory containing probe TOML files'
    required: false
    default: 'probes'
  category:
    description: 'Only run probes in this category (prompt_injection, data_exfiltration, etc.)'
    required: false
  probe:
    description: 'Only run a specific probe by name'
    required: false
  timeout:
    description: 'Timeout per probe in seconds'
    required: false
    default: '120'
  format:
    description: 'Output format: terminal or json'
    required: false
    default: 'terminal'
  fail-on-findings:
    description: 'Fail the action if any probe finds security issues'
    required: false
    default: 'true'
  jobs:
    description: 'Number of probes to run in parallel (default: 1)'
    required: false
    default: '1'
  aegis-version:
    description: 'Version of aegis-probe to install (default: latest)'
    required: false
    default: 'latest'

outputs:
  score:
    description: 'Overall security score (0-100)'
    value: ${{ steps.run.outputs.score }}
  passed:
    description: 'Number of probes passed'
    value: ${{ steps.run.outputs.passed }}
  failed:
    description: 'Number of probes failed'
    value: ${{ steps.run.outputs.failed }}
  report-json:
    description: 'Path to the JSON report file'
    value: ${{ steps.run.outputs.report_json }}

runs:
  using: 'composite'
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      shell: bash

    - name: Cache aegis-probe binary
      uses: actions/cache@v4
      id: cache-probe
      with:
        path: ~/.cargo/bin/aegis-probe
        key: aegis-probe-${{ runner.os }}-${{ inputs.aegis-version }}

    - name: Install aegis-probe
      if: steps.cache-probe.outputs.cache-hit != 'true'
      shell: bash
      run: |
        if [ "${{ inputs.aegis-version }}" = "latest" ]; then
          cargo install --git https://github.com/markm39/aegis.git aegis-probe --locked
        else
          cargo install --git https://github.com/markm39/aegis.git --tag "${{ inputs.aegis-version }}" aegis-probe --locked
        fi

    - name: Validate probes
      shell: bash
      run: |
        if [ -d "${{ inputs.probes-dir }}" ]; then
          aegis-probe validate --probes-dir "${{ inputs.probes-dir }}"
        else
          echo "Probes directory '${{ inputs.probes-dir }}' not found, using built-in probes"
        fi

    - name: Run security probes
      id: run
      shell: bash
      run: |
        REPORT_PATH="${{ runner.temp }}/aegis-report.json"
        ARGS="run --probes-dir ${{ inputs.probes-dir }} --agent ${{ inputs.agent }} --timeout ${{ inputs.timeout }} --jobs ${{ inputs.jobs }} --output $REPORT_PATH"

        if [ -n "${{ inputs.agent-binary }}" ]; then
          ARGS="$ARGS --agent-binary ${{ inputs.agent-binary }}"
        fi

        if [ -n "${{ inputs.category }}" ]; then
          ARGS="$ARGS --category ${{ inputs.category }}"
        fi

        if [ -n "${{ inputs.probe }}" ]; then
          ARGS="$ARGS --probe ${{ inputs.probe }}"
        fi

        # Run probes -- terminal output goes to logs, JSON report to file
        set +e
        aegis-probe $ARGS
        EXIT_CODE=$?
        set -e

        # Parse results from JSON report
        if [ -f "$REPORT_PATH" ] && python3 -c "import json; json.load(open('$REPORT_PATH'))" 2>/dev/null; then
          SCORE=$(python3 -c "import json; print(json.load(open('$REPORT_PATH'))['score'])")
          PASSED=$(python3 -c "import json; print(json.load(open('$REPORT_PATH'))['summary']['passed'])")
          FAILED=$(python3 -c "import json; print(json.load(open('$REPORT_PATH'))['summary']['failed'])")
        else
          SCORE=0
          PASSED=0
          FAILED=0
          echo "::warning::Could not parse aegis-probe JSON report"
        fi

        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
        echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
        echo "report_json=$REPORT_PATH" >> "$GITHUB_OUTPUT"

        # Print summary line
        aegis-probe summary "$REPORT_PATH" 2>/dev/null || true

        # Fail the step if requested and there are failures
        if [ "${{ inputs.fail-on-findings }}" = "true" ] && [ "$EXIT_CODE" != "0" ]; then
          echo "::error::Aegis Probe found security issues (score: $SCORE/100, $FAILED probes failed)"
          exit 1
        fi

    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: aegis-security-report
        path: ${{ steps.run.outputs.report_json }}
        retention-days: 30
