name: "Aegis Probe"
description: "Run AI agent security probes in CI with aegis-probe"

inputs:
  agent:
    description: "Agent target to test"
    required: false
    default: "claude-code"
  agent-binary:
    description: "Path to the agent binary if auto-detection should be bypassed"
    required: false
    default: ""
  probes-dir:
    description: "Directory containing probe TOML files"
    required: false
    default: "probes"
  category:
    description: "Optional category filter"
    required: false
    default: ""
  tag:
    description: "Optional tag filter (comma-separated)"
    required: false
    default: ""
  profile:
    description: "Optional named profile filter (comma-separated)"
    required: false
    default: ""
  probe:
    description: "Optional single-probe filter"
    required: false
    default: ""
  timeout:
    description: "Timeout per probe in seconds"
    required: false
    default: "120"
  jobs:
    description: "Number of probes to execute in parallel"
    required: false
    default: "1"
  fail-on:
    description: "Gate severity: fail, partial, or critical"
    required: false
    default: "fail"
  min-score:
    description: "Optional minimum score gate"
    required: false
    default: ""
  capture-output:
    description: "Preserve raw agent output in the local JSON report"
    required: false
    default: "false"
  output:
    description: "Path to write the JSON report"
    required: false
    default: "aegis-report.json"
  sarif-output:
    description: "Optional path to write a SARIF artifact rendered from the JSON report"
    required: false
    default: ""
  junit-output:
    description: "Optional path to write a JUnit artifact rendered from the JSON report"
    required: false
    default: ""
  baseline-report:
    description: "Optional baseline JSON report to compare against the current run"
    required: false
    default: ""
  history-dir:
    description: "Optional directory of saved JSON reports for longitudinal analysis"
    required: false
    default: ""
  history-agent:
    description: "Optional saved-report agent filter to apply when analyzing history-dir"
    required: false
    default: ""
  max-regressions:
    description: "Optional maximum allowed regressions versus baseline-report"
    required: false
    default: ""
  max-unstable-probes:
    description: "Optional maximum allowed unstable probes in history-dir analysis"
    required: false
    default: ""
  min-history-runs:
    description: "Optional minimum required run count after history-dir filtering"
    required: false
    default: ""
  stability-runs:
    description: "Optional number of repeated local runs to add into the history/stability window"
    required: false
    default: "1"

outputs:
  report-path:
    description: "Path to the generated JSON report"
    value: ${{ steps.run.outputs.report_path }}
  exit-code:
    description: "Final exit code after probe, comparison, and history gates"
    value: ${{ steps.run.outputs.exit_code }}
  score:
    description: "Aggregate security score from the JSON report"
    value: ${{ steps.run.outputs.score }}
  passed:
    description: "Number of passing probes"
    value: ${{ steps.run.outputs.passed }}
  partial:
    description: "Number of partial probes"
    value: ${{ steps.run.outputs.partial }}
  failed:
    description: "Number of failed probes"
    value: ${{ steps.run.outputs.failed }}
  errors:
    description: "Number of errored probes"
    value: ${{ steps.run.outputs.errors }}
  probe-pack-hash:
    description: "Stable hash of the executed probe pack"
    value: ${{ steps.run.outputs.probe_pack_hash }}
  schema-version:
    description: "Schema version carried by the JSON report"
    value: ${{ steps.run.outputs.schema_version }}
  sarif-path:
    description: "Path to the rendered SARIF artifact when requested"
    value: ${{ steps.run.outputs.sarif_path }}
  junit-path:
    description: "Path to the rendered JUnit artifact when requested"
    value: ${{ steps.run.outputs.junit_path }}
  compare-path:
    description: "Path to the machine-readable comparison report when baseline-report is set"
    value: ${{ steps.run.outputs.compare_path }}
  history-path:
    description: "Path to the machine-readable history report when history analysis runs"
    value: ${{ steps.run.outputs.history_path }}
  stability-report-dir:
    description: "Directory containing generated repeat-run reports when stability-runs is greater than 1"
    value: ${{ steps.run.outputs.stability_report_dir }}
  regressions:
    description: "Regression count from the baseline comparison when baseline-report is set"
    value: ${{ steps.run.outputs.regressions }}
  improvements:
    description: "Improvement count from the baseline comparison when baseline-report is set"
    value: ${{ steps.run.outputs.improvements }}
  unstable-probes:
    description: "Unstable probe count from the history analysis when history-dir is set"
    value: ${{ steps.run.outputs.unstable_probes }}
  history-run-count:
    description: "Saved run count included in the history analysis when history-dir is set"
    value: ${{ steps.run.outputs.history_run_count }}

runs:
  using: "composite"
  steps:
    - uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2
      with:
        key: aegis-probe-action

    - name: Build aegis-probe
      shell: bash
      working-directory: ${{ github.action_path }}
      run: cargo build --release -p aegis-probe

    - name: Run probes
      id: run
      shell: bash
      run: |
        set -euo pipefail

        probe_bin="${{ github.action_path }}/target/release/aegis-probe"
        report_path="${{ inputs.output }}"
        compare_path="${RUNNER_TEMP}/aegis-compare.json"
        history_path="${RUNNER_TEMP}/aegis-history.json"
        history_input_dir="${RUNNER_TEMP}/aegis-history-input"

        echo "report_path=${report_path}" >> "$GITHUB_OUTPUT"
        echo "sarif_path=" >> "$GITHUB_OUTPUT"
        echo "junit_path=" >> "$GITHUB_OUTPUT"
        echo "compare_path=" >> "$GITHUB_OUTPUT"
        echo "history_path=" >> "$GITHUB_OUTPUT"
        echo "stability_report_dir=" >> "$GITHUB_OUTPUT"
        echo "regressions=" >> "$GITHUB_OUTPUT"
        echo "improvements=" >> "$GITHUB_OUTPUT"
        echo "unstable_probes=" >> "$GITHUB_OUTPUT"
        echo "history_run_count=" >> "$GITHUB_OUTPUT"

        stability_runs="${{ inputs.stability-runs }}"
        if ! [[ "${stability_runs}" =~ ^[0-9]+$ ]] || (( stability_runs < 1 )); then
          echo "stability-runs must be an integer greater than or equal to 1." >&2
          echo "exit_code=1" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        if [[ -n "${{ inputs.max-regressions }}" && -z "${{ inputs.baseline-report }}" ]]; then
          echo "max-regressions requires baseline-report." >&2
          echo "exit_code=1" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        history_requested=0
        if [[ -n "${{ inputs.history-dir }}" || -n "${{ inputs.max-unstable-probes }}" || -n "${{ inputs.min-history-runs }}" || "${stability_runs}" != "1" ]]; then
          history_requested=1
        fi

        common_args=(
          run
          --agent "${{ inputs.agent }}"
          --probes-dir "${{ inputs.probes-dir }}"
          --timeout "${{ inputs.timeout }}"
          --jobs "${{ inputs.jobs }}"
          --format json
          --fail-on "${{ inputs.fail-on }}"
        )

        if [[ -n "${{ inputs.agent-binary }}" ]]; then
          common_args+=(--agent-binary "${{ inputs.agent-binary }}")
        fi

        if [[ -n "${{ inputs.category }}" ]]; then
          common_args+=(--category "${{ inputs.category }}")
        fi

        if [[ -n "${{ inputs.tag }}" ]]; then
          common_args+=(--tag "${{ inputs.tag }}")
        fi

        if [[ -n "${{ inputs.profile }}" ]]; then
          common_args+=(--profile "${{ inputs.profile }}")
        fi

        if [[ -n "${{ inputs.probe }}" ]]; then
          common_args+=(--probe "${{ inputs.probe }}")
        fi

        if [[ "${{ inputs.capture-output }}" == "true" ]]; then
          common_args+=(--capture-output)
        fi

        if [[ -n "${{ inputs.min-score }}" ]]; then
          common_args+=(--min-score "${{ inputs.min-score }}")
        fi

        run_args=("${common_args[@]}" --output "${report_path}")
        run_status=0
        final_status=0
        "${probe_bin}" "${run_args[@]}" || run_status=$?
        final_status=$run_status

        if [[ -f "${report_path}" ]]; then
          REPORT_PATH="${report_path}" python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          report_path = os.environ["REPORT_PATH"]
          with open(report_path, "r", encoding="utf-8") as handle:
              report = json.load(handle)

          summary = report.get("summary", {})
          metadata = report.get("metadata", {})

          print(f"score={report.get('score', '')}")
          print(f"passed={summary.get('passed', '')}")
          print(f"partial={summary.get('partial', '')}")
          print(f"failed={summary.get('failed', '')}")
          print(f"errors={summary.get('errors', '')}")
          print(f"probe_pack_hash={metadata.get('probe_pack_hash', '')}")
          print(f"schema_version={metadata.get('schema_version', '')}")
          PY

          if [[ -n "${{ inputs.sarif-output }}" ]]; then
            mkdir -p "$(dirname "${{ inputs.sarif-output }}")"
            "${probe_bin}" \
              render "${report_path}" \
              --format sarif \
              --output "${{ inputs.sarif-output }}"
            echo "sarif_path=${{ inputs.sarif-output }}" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "${{ inputs.junit-output }}" ]]; then
            mkdir -p "$(dirname "${{ inputs.junit-output }}")"
            "${probe_bin}" \
              render "${report_path}" \
              --format junit \
              --output "${{ inputs.junit-output }}"
            echo "junit_path=${{ inputs.junit-output }}" >> "$GITHUB_OUTPUT"
          fi
        elif [[ "${run_status}" == "0" ]]; then
          echo "Probe run completed without writing ${report_path}." >&2
          final_status=1
        fi

        if [[ -n "${{ inputs.baseline-report }}" ]]; then
          if [[ ! -f "${{ inputs.baseline-report }}" ]]; then
            echo "Baseline report not found: ${{ inputs.baseline-report }}" >&2
            final_status=1
          elif [[ ! -f "${report_path}" ]]; then
            echo "Baseline comparison requires a local JSON report at ${report_path}." >&2
            final_status=1
          else
            compare_args=(
              compare
              "${{ inputs.baseline-report }}"
              "${report_path}"
              --format json
              --output "${compare_path}"
            )

            if [[ -n "${{ inputs.tag }}" ]]; then
              compare_args+=(--tag "${{ inputs.tag }}")
            fi

            if [[ -n "${{ inputs.profile }}" ]]; then
              compare_args+=(--profile "${{ inputs.profile }}")
            fi

            compare_status=0
            "${probe_bin}" "${compare_args[@]}" || compare_status=$?

            if [[ ! -f "${compare_path}" ]]; then
              echo "Comparison did not produce ${compare_path}." >&2
              final_status=1
            else
              echo "compare_path=${compare_path}" >> "$GITHUB_OUTPUT"
              mapfile -t compare_metrics < <(
                COMPARE_PATH="${compare_path}" python3 - <<'PY'
                import json
                import os

                with open(os.environ["COMPARE_PATH"], "r", encoding="utf-8") as handle:
                    comparison = json.load(handle)

                summary = comparison.get("summary", {})
                print(summary.get("regression_count", 0))
                print(summary.get("improvement_count", 0))
                PY
              )
              regressions="${compare_metrics[0]:-0}"
              improvements="${compare_metrics[1]:-0}"
              echo "regressions=${regressions}" >> "$GITHUB_OUTPUT"
              echo "improvements=${improvements}" >> "$GITHUB_OUTPUT"

              regression_limit="${{ inputs.max-regressions }}"
              if [[ -z "${regression_limit}" ]]; then
                regression_limit=0
              fi

              if (( regressions > regression_limit )); then
                echo "Regression gate failed: ${regressions} regressions exceeds limit ${regression_limit}." >&2
                final_status=1
              fi
            fi

            if [[ "${compare_status}" != "0" && "${compare_status}" != "1" ]]; then
              final_status="${compare_status}"
            fi
          fi
        fi

        if (( history_requested == 1 )); then
          if [[ -n "${{ inputs.history-dir }}" && ! -d "${{ inputs.history-dir }}" ]]; then
            echo "History directory not found: ${{ inputs.history-dir }}" >&2
            final_status=1
          elif [[ ! -f "${report_path}" ]]; then
            echo "History analysis requires a local JSON report at ${report_path}." >&2
            final_status=1
          else
            rm -rf "${history_input_dir}"
            mkdir -p "${history_input_dir}"
            if [[ -n "${{ inputs.history-dir }}" ]]; then
              shopt -s nullglob
              for path in "${{ inputs.history-dir }}"/*.json; do
                cp "${path}" "${history_input_dir}/$(basename "${path}")"
              done
              shopt -u nullglob
            fi
            cp "${report_path}" "${history_input_dir}/current-report.json"

            if (( stability_runs > 1 )); then
              echo "stability_report_dir=${history_input_dir}" >> "$GITHUB_OUTPUT"
              for (( run_index = 2; run_index <= stability_runs; run_index++ )); do
                rerun_path="${history_input_dir}/stability-${run_index}.json"
                rerun_args=("${common_args[@]}" --output "${rerun_path}")
                rerun_status=0
                "${probe_bin}" "${rerun_args[@]}" || rerun_status=$?
                if [[ ! -f "${rerun_path}" ]]; then
                  echo "Stability run ${run_index} did not produce ${rerun_path}." >&2
                  final_status=1
                fi
              done
            fi

            history_args=(
              history
              "${history_input_dir}"
              --format json
            )

            if [[ -n "${{ inputs.history-agent }}" ]]; then
              history_args+=(--agent "${{ inputs.history-agent }}")
            fi

            if [[ -n "${{ inputs.tag }}" ]]; then
              history_args+=(--tag "${{ inputs.tag }}")
            fi

            if [[ -n "${{ inputs.profile }}" ]]; then
              history_args+=(--profile "${{ inputs.profile }}")
            fi

            history_status=0
            "${probe_bin}" "${history_args[@]}" > "${history_path}" || history_status=$?

            if [[ "${history_status}" != "0" || ! -f "${history_path}" ]]; then
              echo "History analysis failed for ${history_input_dir}." >&2
              final_status=1
            else
              echo "history_path=${history_path}" >> "$GITHUB_OUTPUT"
              mapfile -t history_metrics < <(
                HISTORY_PATH="${history_path}" python3 - <<'PY'
                import json
                import os

                with open(os.environ["HISTORY_PATH"], "r", encoding="utf-8") as handle:
                    history = json.load(handle)

                print(history.get("run_count", 0))
                print(len(history.get("unstable_probes", [])))
                PY
              )
              history_run_count="${history_metrics[0]:-0}"
              unstable_probes="${history_metrics[1]:-0}"
              echo "history_run_count=${history_run_count}" >> "$GITHUB_OUTPUT"
              echo "unstable_probes=${unstable_probes}" >> "$GITHUB_OUTPUT"

              if [[ -n "${{ inputs.min-history-runs }}" ]] && (( history_run_count < ${{ inputs.min-history-runs }} )); then
                echo "History gate failed: ${history_run_count} runs is below minimum ${{ inputs.min-history-runs }}." >&2
                final_status=1
              fi

              if [[ -n "${{ inputs.max-unstable-probes }}" ]] && (( unstable_probes > ${{ inputs.max-unstable-probes }} )); then
                echo "History gate failed: ${unstable_probes} unstable probes exceeds limit ${{ inputs.max-unstable-probes }}." >&2
                final_status=1
              fi
            fi
          fi
        fi

        echo "exit_code=${final_status}" >> "$GITHUB_OUTPUT"
        exit "${final_status}"
