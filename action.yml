name: "Aegis Probe"
description: "Run AI agent security probes in CI with aegis-probe"

inputs:
  agent:
    description: "Agent target to test"
    required: false
    default: "claude-code"
  agent-binary:
    description: "Path to the agent binary if auto-detection should be bypassed"
    required: false
    default: ""
  probes-dir:
    description: "Directory containing probe TOML files"
    required: false
    default: "probes"
  category:
    description: "Optional category filter"
    required: false
    default: ""
  tag:
    description: "Optional tag filter (comma-separated)"
    required: false
    default: ""
  profile:
    description: "Optional named profile filter (comma-separated)"
    required: false
    default: ""
  probe:
    description: "Optional single-probe filter"
    required: false
    default: ""
  timeout:
    description: "Timeout per probe in seconds"
    required: false
    default: "120"
  jobs:
    description: "Number of probes to execute in parallel"
    required: false
    default: "1"
  fail-on:
    description: "Gate severity: fail, partial, or critical"
    required: false
    default: "fail"
  min-score:
    description: "Optional minimum score gate"
    required: false
    default: ""
  capture-output:
    description: "Preserve raw agent output in the local JSON report"
    required: false
    default: "false"
  output:
    description: "Path to write the JSON report"
    required: false
    default: "aegis-report.json"
  sarif-output:
    description: "Optional path to write a SARIF artifact rendered from the JSON report"
    required: false
    default: ""
  junit-output:
    description: "Optional path to write a JUnit artifact rendered from the JSON report"
    required: false
    default: ""
  baseline-report:
    description: "Optional baseline JSON report to compare against the current run"
    required: false
    default: ""
  waiver-file:
    description: "Optional waiver policy file (TOML or JSON) for gate-time suppressions"
    required: false
    default: ""
  require-signed-waivers:
    description: "Require every waiver in waiver-file to carry a valid signature"
    required: false
    default: "false"
  waiver-key-env:
    description: "Environment variable holding the waiver signing key"
    required: false
    default: "AEGIS_WAIVER_SIGNING_KEY"
  history-dir:
    description: "Optional directory of saved JSON reports for longitudinal analysis"
    required: false
    default: ""
  history-agent:
    description: "Optional saved-report agent filter to apply when analyzing history-dir"
    required: false
    default: ""
  max-regressions:
    description: "Optional maximum allowed regressions versus baseline-report"
    required: false
    default: ""
  max-unstable-probes:
    description: "Optional maximum allowed unstable probes in history-dir analysis"
    required: false
    default: ""
  min-history-runs:
    description: "Optional minimum required run count after history-dir filtering"
    required: false
    default: ""
  stability-runs:
    description: "Optional number of repeated local runs to add into the history/stability window"
    required: false
    default: "1"
  stability-required-runs:
    description: "Minimum number of repeated comparisons a regression must appear in before it counts as enforced"
    required: false
    default: "1"
  max-flaky-regressions:
    description: "Optional maximum allowed flaky regressions across repeated comparisons"
    required: false
    default: ""
  registry-fetch-baseline:
    description: "Fetch baseline-report from the configured registry using registry-baseline-name"
    required: false
    default: "false"
  registry-publish-baseline:
    description: "Publish the current report as a promoted baseline to the configured registry when the action succeeds"
    required: false
    default: "false"
  registry-upload-history:
    description: "Upload the derived history bundle to the configured registry when history analysis runs"
    required: false
    default: "false"
  registry-baseline-name:
    description: "Baseline name used when fetching or publishing registry-backed baselines"
    required: false
    default: "ci-main"

outputs:
  report-path:
    description: "Path to the generated JSON report"
    value: ${{ steps.run.outputs.report_path }}
  exit-code:
    description: "Final exit code after probe, comparison, and history gates"
    value: ${{ steps.run.outputs.exit_code }}
  score:
    description: "Aggregate security score from the JSON report"
    value: ${{ steps.run.outputs.score }}
  passed:
    description: "Number of passing probes"
    value: ${{ steps.run.outputs.passed }}
  partial:
    description: "Number of partial probes"
    value: ${{ steps.run.outputs.partial }}
  failed:
    description: "Number of failed probes"
    value: ${{ steps.run.outputs.failed }}
  errors:
    description: "Number of errored probes"
    value: ${{ steps.run.outputs.errors }}
  probe-pack-hash:
    description: "Stable hash of the executed probe pack"
    value: ${{ steps.run.outputs.probe_pack_hash }}
  schema-version:
    description: "Schema version carried by the JSON report"
    value: ${{ steps.run.outputs.schema_version }}
  sarif-path:
    description: "Path to the rendered SARIF artifact when requested"
    value: ${{ steps.run.outputs.sarif_path }}
  junit-path:
    description: "Path to the rendered JUnit artifact when requested"
    value: ${{ steps.run.outputs.junit_path }}
  compare-path:
    description: "Path to the machine-readable comparison report when baseline-report is set"
    value: ${{ steps.run.outputs.compare_path }}
  history-path:
    description: "Path to the machine-readable history report when history analysis runs"
    value: ${{ steps.run.outputs.history_path }}
  summary-path:
    description: "Path to the Markdown CI summary generated by the action"
    value: ${{ steps.run.outputs.summary_path }}
  stability-report-dir:
    description: "Directory containing generated repeat-run reports when stability-runs is greater than 1"
    value: ${{ steps.run.outputs.stability_report_dir }}
  regressions:
    description: "Regression count from the baseline comparison when baseline-report is set"
    value: ${{ steps.run.outputs.regressions }}
  confirmed-regressions:
    description: "Regression count that met the stability-required-runs threshold"
    value: ${{ steps.run.outputs.confirmed_regressions }}
  flaky-regressions:
    description: "Regression count that appeared but did not meet the stability-required-runs threshold"
    value: ${{ steps.run.outputs.flaky_regressions }}
  waived-regressions:
    description: "Regression count that was suppressed by active waivers"
    value: ${{ steps.run.outputs.waived_regressions }}
  improvements:
    description: "Improvement count from the baseline comparison when baseline-report is set"
    value: ${{ steps.run.outputs.improvements }}
  unstable-probes:
    description: "Unstable probe count from the history analysis when history-dir is set"
    value: ${{ steps.run.outputs.unstable_probes }}
  history-run-count:
    description: "Saved run count included in the history analysis when history-dir is set"
    value: ${{ steps.run.outputs.history_run_count }}

runs:
  using: "composite"
  steps:
    - uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2
      with:
        key: aegis-probe-action

    - name: Build aegis-probe
      shell: bash
      working-directory: ${{ github.action_path }}
      run: cargo build --release -p aegis-probe

    - name: Run probes
      id: run
      shell: bash
      run: |
        set -euo pipefail

        probe_bin="${{ github.action_path }}/target/release/aegis-probe"
        report_path="${{ inputs.output }}"
        compare_path="${RUNNER_TEMP}/aegis-compare.json"
        history_path="${RUNNER_TEMP}/aegis-history.json"
        history_input_dir="${RUNNER_TEMP}/aegis-history-input"
        summary_path="${RUNNER_TEMP}/aegis-summary.md"
        fetched_baseline_path="${RUNNER_TEMP}/aegis-registry-baseline.json"
        baseline_bundle_path="${RUNNER_TEMP}/aegis-registry-baseline.bundle.json"
        compare_runs_dir="${RUNNER_TEMP}/aegis-compare-runs"
        baseline_report_path="${{ inputs.baseline-report }}"

        echo "report_path=${report_path}" >> "$GITHUB_OUTPUT"
        echo "sarif_path=" >> "$GITHUB_OUTPUT"
        echo "junit_path=" >> "$GITHUB_OUTPUT"
        echo "compare_path=" >> "$GITHUB_OUTPUT"
        echo "history_path=" >> "$GITHUB_OUTPUT"
        echo "summary_path=" >> "$GITHUB_OUTPUT"
        echo "stability_report_dir=" >> "$GITHUB_OUTPUT"
        echo "regressions=" >> "$GITHUB_OUTPUT"
        echo "confirmed_regressions=" >> "$GITHUB_OUTPUT"
        echo "flaky_regressions=" >> "$GITHUB_OUTPUT"
        echo "waived_regressions=" >> "$GITHUB_OUTPUT"
        echo "improvements=" >> "$GITHUB_OUTPUT"
        echo "unstable_probes=" >> "$GITHUB_OUTPUT"
        echo "history_run_count=" >> "$GITHUB_OUTPUT"

        stability_runs="${{ inputs.stability-runs }}"
        if ! [[ "${stability_runs}" =~ ^[0-9]+$ ]] || (( stability_runs < 1 )); then
          echo "stability-runs must be an integer greater than or equal to 1." >&2
          echo "exit_code=1" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        stability_required_runs="${{ inputs.stability-required-runs }}"
        if ! [[ "${stability_required_runs}" =~ ^[0-9]+$ ]] || (( stability_required_runs < 1 )); then
          echo "stability-required-runs must be an integer greater than or equal to 1." >&2
          echo "exit_code=1" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        if (( stability_required_runs > stability_runs )); then
          echo "stability-required-runs cannot exceed stability-runs." >&2
          echo "exit_code=1" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        if [[ -n "${{ inputs.baseline-report }}" && "${{ inputs.registry-fetch-baseline }}" == "true" ]]; then
          echo "baseline-report and registry-fetch-baseline are mutually exclusive." >&2
          echo "exit_code=1" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        history_requested=0
        if [[ -n "${{ inputs.history-dir }}" || -n "${{ inputs.max-unstable-probes }}" || -n "${{ inputs.min-history-runs }}" || "${stability_runs}" != "1" || "${{ inputs.registry-upload-history }}" == "true" ]]; then
          history_requested=1
        fi

        common_args=(
          run
          --agent "${{ inputs.agent }}"
          --probes-dir "${{ inputs.probes-dir }}"
          --timeout "${{ inputs.timeout }}"
          --jobs "${{ inputs.jobs }}"
          --format json
          --fail-on "${{ inputs.fail-on }}"
        )

        if [[ -n "${{ inputs.agent-binary }}" ]]; then
          common_args+=(--agent-binary "${{ inputs.agent-binary }}")
        fi

        if [[ -n "${{ inputs.category }}" ]]; then
          common_args+=(--category "${{ inputs.category }}")
        fi

        if [[ -n "${{ inputs.tag }}" ]]; then
          common_args+=(--tag "${{ inputs.tag }}")
        fi

        if [[ -n "${{ inputs.profile }}" ]]; then
          common_args+=(--profile "${{ inputs.profile }}")
        fi

        if [[ -n "${{ inputs.probe }}" ]]; then
          common_args+=(--probe "${{ inputs.probe }}")
        fi

        if [[ "${{ inputs.capture-output }}" == "true" ]]; then
          common_args+=(--capture-output)
        fi

        if [[ -n "${{ inputs.min-score }}" ]]; then
          common_args+=(--min-score "${{ inputs.min-score }}")
        fi
        if [[ -n "${{ inputs.waiver-file }}" ]]; then
          common_args+=(--waiver-file "${{ inputs.waiver-file }}")
          if [[ "${{ inputs.require-signed-waivers }}" == "true" ]]; then
            common_args+=(--require-signed-waivers)
          fi
          if [[ -n "${{ inputs.waiver-key-env }}" ]]; then
            common_args+=(--waiver-key-env "${{ inputs.waiver-key-env }}")
          fi
        fi

        run_args=("${common_args[@]}" --output "${report_path}")
        run_status=0
        final_status=0
        "${probe_bin}" "${run_args[@]}" || run_status=$?
        final_status=$run_status

        if [[ -f "${report_path}" ]]; then
          REPORT_PATH="${report_path}" python3 -c 'import textwrap; exec(textwrap.dedent("""
            import json
            import os

            report_path = os.environ["REPORT_PATH"]
            with open(report_path, "r", encoding="utf-8") as handle:
                report = json.load(handle)

            summary = report.get("summary", {})
            metadata = report.get("metadata", {})

            print("score=" + str(report.get("score", "")))
            print("passed=" + str(summary.get("passed", "")))
            print("partial=" + str(summary.get("partial", "")))
            print("failed=" + str(summary.get("failed", "")))
            print("errors=" + str(summary.get("errors", "")))
            print("probe_pack_hash=" + str(metadata.get("probe_pack_hash", "")))
            print("schema_version=" + str(metadata.get("schema_version", "")))
          """))' >> "$GITHUB_OUTPUT"

          if [[ -n "${{ inputs.sarif-output }}" ]]; then
            mkdir -p "$(dirname "${{ inputs.sarif-output }}")"
            "${probe_bin}" \
              render "${report_path}" \
              --format sarif \
              --output "${{ inputs.sarif-output }}"
            echo "sarif_path=${{ inputs.sarif-output }}" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "${{ inputs.junit-output }}" ]]; then
            mkdir -p "$(dirname "${{ inputs.junit-output }}")"
            "${probe_bin}" \
              render "${report_path}" \
              --format junit \
              --output "${{ inputs.junit-output }}"
            echo "junit_path=${{ inputs.junit-output }}" >> "$GITHUB_OUTPUT"
          fi
        elif [[ "${run_status}" == "0" ]]; then
          echo "Probe run completed without writing ${report_path}." >&2
          final_status=1
        fi

        if [[ "${{ inputs.registry-fetch-baseline }}" == "true" ]]; then
          if [[ ! -f "${report_path}" ]]; then
            echo "Registry baseline fetch requires a local JSON report at ${report_path}." >&2
            final_status=1
          else
            report_agent="$(
              REPORT_PATH="${report_path}" python3 -c 'import textwrap; exec(textwrap.dedent("""
                import json
                import os

                with open(os.environ["REPORT_PATH"], "r", encoding="utf-8") as handle:
                    report = json.load(handle)
                print(report.get("agent", ""))
              """))'
            )"
            if [[ -z "${report_agent}" ]]; then
              echo "Could not resolve report.agent for registry baseline fetch." >&2
              final_status=1
            else
              fetch_args=(
                baseline
                fetch
                --registry
                --agent "${report_agent}"
                --name "${{ inputs.registry-baseline-name }}"
                --format report
                --output "${fetched_baseline_path}"
              )
              if [[ -n "${{ inputs.tag }}" ]]; then
                fetch_args+=(--tag "${{ inputs.tag }}")
              fi
              if [[ -n "${{ inputs.profile }}" ]]; then
                fetch_args+=(--profile "${{ inputs.profile }}")
              fi
              fetch_status=0
              "${probe_bin}" "${fetch_args[@]}" || fetch_status=$?
              if [[ "${fetch_status}" != "0" || ! -f "${fetched_baseline_path}" ]]; then
                echo "Registry baseline fetch failed for baseline '${{ inputs.registry-baseline-name }}'." >&2
                final_status=1
              else
                baseline_report_path="${fetched_baseline_path}"
              fi
            fi
          fi
        fi

        history_ready=0
        if (( history_requested == 1 || (stability_runs > 1 && ${#baseline_report_path} > 0) )); then
          if [[ -n "${{ inputs.history-dir }}" && ! -d "${{ inputs.history-dir }}" ]]; then
            echo "History directory not found: ${{ inputs.history-dir }}" >&2
            final_status=1
          else
            if [[ ! -f "${report_path}" ]]; then
              echo "History/stability analysis requires a local JSON report at ${report_path}." >&2
              final_status=1
            else
              rm -rf "${history_input_dir}"
              mkdir -p "${history_input_dir}"
              if [[ -n "${{ inputs.history-dir }}" ]]; then
                shopt -s nullglob
                for path in "${{ inputs.history-dir }}"/*.json; do
                  cp "${path}" "${history_input_dir}/$(basename "${path}")"
                done
                shopt -u nullglob
              fi
              cp "${report_path}" "${history_input_dir}/current-report.json"

              if (( stability_runs > 1 )); then
                echo "stability_report_dir=${history_input_dir}" >> "$GITHUB_OUTPUT"
                for (( run_index = 2; run_index <= stability_runs; run_index++ )); do
                  rerun_path="${history_input_dir}/stability-${run_index}.json"
                  rerun_args=("${common_args[@]}" --output "${rerun_path}")
                  rerun_status=0
                  "${probe_bin}" "${rerun_args[@]}" || rerun_status=$?
                  if [[ ! -f "${rerun_path}" ]]; then
                    echo "Stability run ${run_index} did not produce ${rerun_path}." >&2
                    final_status=1
                  fi
                done
              fi
              history_ready=1
            fi
          fi
        fi

        if [[ -n "${baseline_report_path}" ]]; then
          if [[ ! -f "${baseline_report_path}" ]]; then
            echo "Baseline report not found: ${baseline_report_path}" >&2
            final_status=1
          elif [[ ! -f "${report_path}" ]]; then
            echo "Baseline comparison requires a local JSON report at ${report_path}." >&2
            final_status=1
          else
            rm -rf "${compare_runs_dir}"
            mkdir -p "${compare_runs_dir}"

            compare_args=(
              compare
              "${baseline_report_path}"
              "${report_path}"
              --format json
              --output "${compare_path}"
            )

            if [[ -n "${{ inputs.tag }}" ]]; then
              compare_args+=(--tag "${{ inputs.tag }}")
            fi
            if [[ -n "${{ inputs.profile }}" ]]; then
              compare_args+=(--profile "${{ inputs.profile }}")
            fi
            if [[ -n "${{ inputs.waiver-file }}" ]]; then
              compare_args+=(--waiver-file "${{ inputs.waiver-file }}")
              if [[ "${{ inputs.require-signed-waivers }}" == "true" ]]; then
                compare_args+=(--require-signed-waivers)
              fi
              if [[ -n "${{ inputs.waiver-key-env }}" ]]; then
                compare_args+=(--waiver-key-env "${{ inputs.waiver-key-env }}")
              fi
            fi

            compare_status=0
            "${probe_bin}" "${compare_args[@]}" || compare_status=$?
            if [[ ! -f "${compare_path}" ]]; then
              echo "Comparison did not produce ${compare_path}." >&2
              final_status=1
            else
              cp "${compare_path}" "${compare_runs_dir}/run-1.json"
              echo "compare_path=${compare_path}" >> "$GITHUB_OUTPUT"

              if (( stability_runs > 1 )) && (( history_ready == 1 )); then
                run_number=2
                shopt -s nullglob
                for rerun_path in "${history_input_dir}"/stability-*.json; do
                  rerun_compare_path="${compare_runs_dir}/run-${run_number}.json"
                  rerun_compare_args=(
                    compare
                    "${baseline_report_path}"
                    "${rerun_path}"
                    --format json
                    --output "${rerun_compare_path}"
                  )
                  if [[ -n "${{ inputs.tag }}" ]]; then
                    rerun_compare_args+=(--tag "${{ inputs.tag }}")
                  fi
                  if [[ -n "${{ inputs.profile }}" ]]; then
                    rerun_compare_args+=(--profile "${{ inputs.profile }}")
                  fi
                  if [[ -n "${{ inputs.waiver-file }}" ]]; then
                    rerun_compare_args+=(--waiver-file "${{ inputs.waiver-file }}")
                    if [[ "${{ inputs.require-signed-waivers }}" == "true" ]]; then
                      rerun_compare_args+=(--require-signed-waivers)
                    fi
                    if [[ -n "${{ inputs.waiver-key-env }}" ]]; then
                      rerun_compare_args+=(--waiver-key-env "${{ inputs.waiver-key-env }}")
                    fi
                  fi
                  rerun_compare_status=0
                  "${probe_bin}" "${rerun_compare_args[@]}" || rerun_compare_status=$?
                  if [[ ! -f "${rerun_compare_path}" ]]; then
                    echo "Stability comparison ${run_number} did not produce ${rerun_compare_path}." >&2
                    final_status=1
                  fi
                  run_number=$(( run_number + 1 ))
                done
                shopt -u nullglob
              fi

              mapfile -t compare_metrics < <(
                COMPARE_PATH="${compare_path}" \
                COMPARE_RUNS_DIR="${compare_runs_dir}" \
                STABILITY_REQUIRED_RUNS="${stability_required_runs}" python3 -c 'import textwrap; exec(textwrap.dedent("""
                  import json
                  import os
                  from collections import Counter

                  with open(os.environ["COMPARE_PATH"], "r", encoding="utf-8") as handle:
                      primary = json.load(handle)
                  summary = primary.get("summary", {})
                  main_regressions = int(summary.get("regression_count", 0))
                  improvements = int(summary.get("improvement_count", 0))
                  waived = {item.get("probe_name", "") for item in primary.get("waived_regressions", [])}

                  regression_counts = Counter()
                  compare_dir = os.environ["COMPARE_RUNS_DIR"]
                  if os.path.isdir(compare_dir):
                      for entry in sorted(os.listdir(compare_dir)):
                          if not entry.endswith(".json"):
                              continue
                          with open(os.path.join(compare_dir, entry), "r", encoding="utf-8") as handle:
                              comparison = json.load(handle)
                          for regression in comparison.get("regressions", []):
                              probe_name = regression.get("probe_name", "")
                              if probe_name:
                                  regression_counts[probe_name] += 1
                          for item in comparison.get("waived_regressions", []):
                              probe_name = item.get("probe_name", "")
                              if probe_name:
                                  waived.add(probe_name)

                  threshold = int(os.environ["STABILITY_REQUIRED_RUNS"])
                  confirmed = sum(1 for count in regression_counts.values() if count >= threshold)
                  flaky = sum(1 for count in regression_counts.values() if 0 < count < threshold)

                  print(main_regressions)
                  print(improvements)
                  print(confirmed if regression_counts else main_regressions)
                  print(flaky if regression_counts else 0)
                  print(len(waived))
                """))'
              )

              regressions="${compare_metrics[0]:-0}"
              improvements="${compare_metrics[1]:-0}"
              confirmed_regressions="${compare_metrics[2]:-0}"
              flaky_regressions="${compare_metrics[3]:-0}"
              waived_regressions="${compare_metrics[4]:-0}"
              echo "regressions=${regressions}" >> "$GITHUB_OUTPUT"
              echo "improvements=${improvements}" >> "$GITHUB_OUTPUT"
              echo "confirmed_regressions=${confirmed_regressions}" >> "$GITHUB_OUTPUT"
              echo "flaky_regressions=${flaky_regressions}" >> "$GITHUB_OUTPUT"
              echo "waived_regressions=${waived_regressions}" >> "$GITHUB_OUTPUT"

              if [[ -n "${{ inputs.max-regressions }}" ]] && (( confirmed_regressions > ${{ inputs.max-regressions }} )); then
                echo "Regression gate failed: ${confirmed_regressions} confirmed regressions exceeds limit ${{ inputs.max-regressions }}." >&2
                final_status=1
              fi
              if [[ -n "${{ inputs.max-flaky-regressions }}" ]] && (( flaky_regressions > ${{ inputs.max-flaky-regressions }} )); then
                echo "Flaky regression gate failed: ${flaky_regressions} flaky regressions exceeds limit ${{ inputs.max-flaky-regressions }}." >&2
                final_status=1
              fi
            fi

            if [[ "${compare_status}" != "0" && "${compare_status}" != "1" ]]; then
              final_status="${compare_status}"
            fi
          fi
        elif [[ -n "${{ inputs.max-regressions }}" ]]; then
          echo "max-regressions requires baseline-report or registry-fetch-baseline." >&2
          final_status=1
        fi

        if (( history_requested == 1 )); then
          if (( history_ready != 1 )); then
            echo "History analysis could not run because the history input directory was not prepared." >&2
            final_status=1
          else
            history_args=(
              history
              "${history_input_dir}"
              --format json
            )
            if [[ -n "${{ inputs.history-agent }}" ]]; then
              history_args+=(--agent "${{ inputs.history-agent }}")
            fi
            if [[ -n "${{ inputs.tag }}" ]]; then
              history_args+=(--tag "${{ inputs.tag }}")
            fi
            if [[ -n "${{ inputs.profile }}" ]]; then
              history_args+=(--profile "${{ inputs.profile }}")
            fi
            if [[ -n "${{ inputs.waiver-file }}" ]]; then
              history_args+=(--waiver-file "${{ inputs.waiver-file }}")
              if [[ "${{ inputs.require-signed-waivers }}" == "true" ]]; then
                history_args+=(--require-signed-waivers)
              fi
              if [[ -n "${{ inputs.waiver-key-env }}" ]]; then
                history_args+=(--waiver-key-env "${{ inputs.waiver-key-env }}")
              fi
            fi

            history_status=0
            "${probe_bin}" "${history_args[@]}" > "${history_path}" || history_status=$?
            if [[ "${history_status}" != "0" || ! -f "${history_path}" ]]; then
              echo "History analysis failed for ${history_input_dir}." >&2
              final_status=1
            else
              echo "history_path=${history_path}" >> "$GITHUB_OUTPUT"
              mapfile -t history_metrics < <(
                HISTORY_PATH="${history_path}" python3 -c 'import textwrap; exec(textwrap.dedent("""
                  import json
                  import os

                  with open(os.environ["HISTORY_PATH"], "r", encoding="utf-8") as handle:
                      history = json.load(handle)

                  print(history.get("run_count", 0))
                  print(len(history.get("unstable_probes", [])))
                """))'
              )
              history_run_count="${history_metrics[0]:-0}"
              unstable_probes="${history_metrics[1]:-0}"
              echo "history_run_count=${history_run_count}" >> "$GITHUB_OUTPUT"
              echo "unstable_probes=${unstable_probes}" >> "$GITHUB_OUTPUT"

              if [[ -n "${{ inputs.min-history-runs }}" ]] && (( history_run_count < ${{ inputs.min-history-runs }} )); then
                echo "History gate failed: ${history_run_count} runs is below minimum ${{ inputs.min-history-runs }}." >&2
                final_status=1
              fi
              if [[ -n "${{ inputs.max-unstable-probes }}" ]] && (( unstable_probes > ${{ inputs.max-unstable-probes }} )); then
                echo "History gate failed: ${unstable_probes} unstable probes exceeds limit ${{ inputs.max-unstable-probes }}." >&2
                final_status=1
              fi

              if [[ "${{ inputs.registry-upload-history }}" == "true" ]]; then
                upload_history_args=(
                  registry
                  upload-history
                  "${history_input_dir}"
                )
                if [[ -n "${{ inputs.history-agent }}" ]]; then
                  upload_history_args+=(--agent "${{ inputs.history-agent }}")
                fi
                if [[ -n "${{ inputs.tag }}" ]]; then
                  upload_history_args+=(--tag "${{ inputs.tag }}")
                fi
                if [[ -n "${{ inputs.profile }}" ]]; then
                  upload_history_args+=(--profile "${{ inputs.profile }}")
                fi
                upload_history_status=0
                "${probe_bin}" "${upload_history_args[@]}" || upload_history_status=$?
                if [[ "${upload_history_status}" != "0" ]]; then
                  echo "Registry history upload failed." >&2
                  final_status=1
                fi
              fi
            fi
          fi
        fi

        if [[ -f "${report_path}" ]]; then
          REPORT_PATH="${report_path}" \
          COMPARE_PATH="${compare_path}" \
          HISTORY_PATH="${history_path}" \
          SUMMARY_PATH="${summary_path}" \
          REGISTRY_BASELINE_NAME="${{ inputs.registry-baseline-name }}" \
          BASELINE_REPORT_PATH="${baseline_report_path}" \
          python3 -c 'import textwrap; exec(textwrap.dedent("""
            import json
            import os

            with open(os.environ["REPORT_PATH"], "r", encoding="utf-8") as handle:
                report = json.load(handle)

            compare = None
            history = None
            compare_path = os.environ["COMPARE_PATH"]
            history_path = os.environ["HISTORY_PATH"]

            if os.path.exists(compare_path):
                with open(compare_path, "r", encoding="utf-8") as handle:
                    compare = json.load(handle)

            if os.path.exists(history_path):
                with open(history_path, "r", encoding="utf-8") as handle:
                    history = json.load(handle)

            summary = report.get("summary", {})
            metadata = report.get("metadata", {})
            applied = metadata.get("applied_waivers", [])

            lines = [
                "## Aegis CI Summary",
                "",
                f"- Agent: {report.get(\"agent\", \"\")}",
                f"- Score: {report.get(\"score\", 0)}/100",
                f"- Probe pack: {metadata.get(\"probe_pack_hash\", \"\")}",
                f"- Report: `{os.environ[\"REPORT_PATH\"]}`",
                "",
                "| Metric | Count |",
                "|---|---:|",
                f"| Passed | {summary.get(\"passed\", 0)} |",
                f"| Failed | {summary.get(\"failed\", 0)} |",
                f"| Partial | {summary.get(\"partial\", 0)} |",
                f"| Errors | {summary.get(\"errors\", 0)} |",
            ]

            if applied:
                lines.extend([
                    "",
                    "### Active Waivers",
                    "",
                    "| Probe | Waiver | Owner | Expires |",
                    "|---|---|---|---|",
                ])
                for waiver in applied:
                    lines.append(
                        f"| {waiver.get(\"probe_name\", \"\")} | {waiver.get(\"id\", \"\")} | {waiver.get(\"owner\", \"\")} | {waiver.get(\"expires_at\", \"\")} |"
                    )

            if compare is not None:
                compare_summary = compare.get("summary", {})
                lines.extend([
                    "",
                    "### Baseline Comparison",
                    "",
                    f"- Baseline report: `{os.environ[\"BASELINE_REPORT_PATH\"]}`",
                    f"- Regressions: {compare_summary.get(\"regression_count\", 0)}",
                    f"- Waived regressions: {compare_summary.get(\"waived_regression_count\", 0)}",
                    f"- Improvements: {compare_summary.get(\"improvement_count\", 0)}",
                    f"- Compare artifact: `{compare_path}`",
                ])

            if history is not None:
                lines.extend([
                    "",
                    "### Longitudinal History",
                    "",
                    f"- Runs analyzed: {history.get(\"run_count\", 0)}",
                    f"- Unstable probes: {len(history.get(\"unstable_probes\", []))}",
                    f"- History artifact: `{history_path}`",
                ])

            with open(os.environ["SUMMARY_PATH"], "w", encoding="utf-8") as handle:
                handle.write("\\n".join(lines) + "\\n")
          """))'
          echo "summary_path=${summary_path}" >> "$GITHUB_OUTPUT"
          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            cat "${summary_path}" >> "${GITHUB_STEP_SUMMARY}"
          fi
        fi

        confirmed_regressions="${confirmed_regressions:-0}"
        flaky_regressions="${flaky_regressions:-0}"
        waived_regressions="${waived_regressions:-0}"
        unstable_probes="${unstable_probes:-0}"

        if (( confirmed_regressions > 0 )); then
          echo "::error title=Aegis confirmed regressions::${confirmed_regressions} confirmed regressions exceeded the baseline."
        fi
        if (( flaky_regressions > 0 )); then
          echo "::warning title=Aegis flaky regressions::${flaky_regressions} regressions appeared but did not meet the stability threshold."
        fi
        if (( unstable_probes > 0 )); then
          echo "::warning title=Aegis unstable probes::${unstable_probes} unstable probes were detected in the history window."
        fi
        if (( waived_regressions > 0 )); then
          echo "::notice title=Aegis waived regressions::${waived_regressions} regressions were suppressed by active waivers."
        fi

        if [[ "${{ inputs.registry-publish-baseline }}" == "true" && "${final_status}" == "0" && -f "${report_path}" ]]; then
          promote_args=(
            baseline
            promote
            "${report_path}"
            --name "${{ inputs.registry-baseline-name }}"
            --output "${baseline_bundle_path}"
          )
          if [[ -n "${{ inputs.tag }}" ]]; then
            promote_args+=(--tag "${{ inputs.tag }}")
          fi
          if [[ -n "${{ inputs.profile }}" ]]; then
            promote_args+=(--profile "${{ inputs.profile }}")
          fi
          promote_status=0
          "${probe_bin}" "${promote_args[@]}" || promote_status=$?
          if [[ "${promote_status}" != "0" || ! -f "${baseline_bundle_path}" ]]; then
            echo "Registry baseline promote failed." >&2
            final_status=1
          else
            publish_status=0
            "${probe_bin}" baseline publish "${baseline_bundle_path}" --registry || publish_status=$?
            if [[ "${publish_status}" != "0" ]]; then
              echo "Registry baseline publish failed." >&2
              final_status=1
            fi
          fi
        fi

        echo "exit_code=${final_status}" >> "$GITHUB_OUTPUT"
        exit "${final_status}"
